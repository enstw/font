# .github/workflows/build-release.yml
#
# Main build and release workflow for ENS Font.
#
# Triggered by:
#   - repository_dispatch (event: upstream-updated) from check-upstream.yml
#   - workflow_dispatch for manual builds
#
# Produces six TTF files: (Light, Regular, Bold) x (ENS Font, ENS Font Mono)
# plus a TrueType Collection (ENSFont.ttc) bundling all six,
# packaged into a ZIP archive and published as a GitHub Release.
#
# Upstream donor mapping:
#   - ENS Font (non-mono): JetBrains Sans + NerdFontsSymbolsOnly (pre-patched by patch.py)
#   - ENS Font Mono:       JetBrainsMono Nerd Font Mono
#
# Required secrets:
#   BOT_PAT  - Fine-grained PAT with: contents:write
#
# Job dependency graph:
#   resolve-params
#       |
#   download-fonts
#       |
#   build (matrix x6, parallel)
#       |
#   bundle-ttc
#       |
#   release

name: Build and Release ENS Font

on:
  repository_dispatch:
    types: [upstream-updated]

  workflow_dispatch:
    inputs:
      git_tag:
        description: "Git tag to create (leave blank to read from versions.json)"
        required: false
      lxgw_tag:
        description: "LXGW WenKai release tag (e.g. v1.521)"
        required: false
      nerd_tag:
        description: "Nerd Fonts release tag (e.g. v3.4.0)"
        required: false
      jbm_tag:
        description: "JetBrains Mono release tag (e.g. v2.304)"
        required: false

permissions:
  contents: write

env:
  PYTHON_VERSION: "3.12"

# ---------------------------------------------------------------------------
# Job 1: Resolve build parameters
# ---------------------------------------------------------------------------
jobs:
  resolve-params:
    runs-on: ubuntu-latest
    outputs:
      git_tag: ${{ steps.params.outputs.git_tag }}
      version: ${{ steps.params.outputs.version }}
      lxgw_tag: ${{ steps.params.outputs.lxgw_tag }}
      nerd_tag: ${{ steps.params.outputs.nerd_tag }}
      jbm_tag: ${{ steps.params.outputs.jbm_tag }}
      lxgw_changed: ${{ steps.params.outputs.lxgw_changed }}
      nerd_changed: ${{ steps.params.outputs.nerd_changed }}
      jbm_changed: ${{ steps.params.outputs.jbm_changed }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve parameters
        id: params
        run: |
          # Priority: dispatch payload > workflow_dispatch inputs > versions.json
          GIT_TAG="${{ github.event.client_payload.git_tag || github.event.inputs.git_tag }}"
          LXGW_TAG="${{ github.event.client_payload.lxgw_tag || github.event.inputs.lxgw_tag }}"
          NERD_TAG="${{ github.event.client_payload.nerd_tag || github.event.inputs.nerd_tag }}"
          JBM_TAG="${{ github.event.client_payload.jbm_tag || github.event.inputs.jbm_tag }}"

          # Fallback: read from versions.json
          if [ -z "$GIT_TAG" ]; then
            GIT_TAG=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['packaging']['git_tag'])")
          fi
          if [ -z "$LXGW_TAG" ]; then
            LXGW_TAG=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['upstream']['lxgw_wenkai']['tag'])")
          fi
          if [ -z "$NERD_TAG" ]; then
            NERD_TAG=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['upstream']['nerd_fonts']['tag'])")
          fi
          if [ -z "$JBM_TAG" ]; then
            JBM_TAG=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['upstream']['jetbrains_mono']['tag'])")
          fi

          # Extract X.Y.Z from tag (strip leading 'v', take up to first '_')
          VERSION=$(echo "$GIT_TAG" | sed 's/^v//' | cut -d'_' -f1)

          # Detect which upstream changed.
          # check_versions.py stores the previous tags in versions.json (prev_lxgw_tag /
          # prev_nerd_tag) before overwriting, and also passes them via dispatch payload.
          # Fallback chain: payload → versions.json → empty string (= both changed)
          PREV_LXGW="${{ github.event.client_payload.prev_lxgw_tag }}"
          PREV_NERD="${{ github.event.client_payload.prev_nerd_tag }}"

          if [ -z "$PREV_LXGW" ]; then
            PREV_LXGW=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['packaging'].get('prev_lxgw_tag', ''))")
          fi
          if [ -z "$PREV_NERD" ]; then
            PREV_NERD=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['packaging'].get('prev_nerd_tag', ''))")
          fi

          PREV_JBM="${{ github.event.client_payload.prev_jbm_tag }}"
          if [ -z "$PREV_JBM" ]; then
            PREV_JBM=$(python3 -c "import json; d=json.load(open('versions.json')); print(d['packaging'].get('prev_jbm_tag', ''))")
          fi

          LXGW_CHANGED="false"
          NERD_CHANGED="false"
          JBM_CHANGED="false"
          { [ -z "$PREV_LXGW" ] || [ "$LXGW_TAG" != "$PREV_LXGW" ]; } && LXGW_CHANGED="true"
          { [ -z "$PREV_NERD"  ] || [ "$NERD_TAG"  != "$PREV_NERD"  ]; } && NERD_CHANGED="true"
          { [ -z "$PREV_JBM"   ] || [ "$JBM_TAG"   != "$PREV_JBM"   ]; } && JBM_CHANGED="true"
          # Fallback: if all still false (shouldn't happen), show all
          if [ "$LXGW_CHANGED" = "false" ] && [ "$NERD_CHANGED" = "false" ] && [ "$JBM_CHANGED" = "false" ]; then
            LXGW_CHANGED="true"
            NERD_CHANGED="true"
            JBM_CHANGED="true"
          fi

          echo "git_tag=$GIT_TAG"           >> "$GITHUB_OUTPUT"
          echo "version=$VERSION"           >> "$GITHUB_OUTPUT"
          echo "lxgw_tag=$LXGW_TAG"         >> "$GITHUB_OUTPUT"
          echo "nerd_tag=$NERD_TAG"          >> "$GITHUB_OUTPUT"
          echo "jbm_tag=$JBM_TAG"            >> "$GITHUB_OUTPUT"
          echo "lxgw_changed=$LXGW_CHANGED" >> "$GITHUB_OUTPUT"
          echo "nerd_changed=$NERD_CHANGED"  >> "$GITHUB_OUTPUT"
          echo "jbm_changed=$JBM_CHANGED"    >> "$GITHUB_OUTPUT"

          echo "--- Build parameters ---"
          echo "  git_tag      : $GIT_TAG"
          echo "  version      : $VERSION"
          echo "  lxgw_tag     : $LXGW_TAG  (prev: $PREV_LXGW, changed: $LXGW_CHANGED)"
          echo "  nerd_tag     : $NERD_TAG   (prev: $PREV_NERD,  changed: $NERD_CHANGED)"
          echo "  jbm_tag      : $JBM_TAG    (prev: $PREV_JBM,   changed: $JBM_CHANGED)"

  # ---------------------------------------------------------------------------
  # Job 2: Download upstream font sources
  # ---------------------------------------------------------------------------
  download-fonts:
    needs: resolve-params
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download LXGW WenKai / WenKai Mono TTF files
        env:
          LXGW_TAG: ${{ needs.resolve-params.outputs.lxgw_tag }}
        run: |
          mkdir -p fonts/wenkai
          BASE_URL="https://github.com/lxgw/LxgwWenKai/releases/download/${LXGW_TAG}"
          # Both WenKai and WenKai Mono ship Regular/Medium/Light (no Bold).
          # Medium is used as the CJK base for Bold styles.
          for VARIANT in Regular Medium Light; do
            for FAMILY in LXGWWenKai LXGWWenKaiMono; do
              FILE="${FAMILY}-${VARIANT}.ttf"
              echo "Downloading ${BASE_URL}/${FILE} ..."
              curl -fsSL "${BASE_URL}/${FILE}" -o "fonts/wenkai/${FILE}"
            done
          done
          echo "LXGW WenKai downloads:"
          ls -lh fonts/wenkai/
          test -f fonts/wenkai/LXGWWenKai-Light.ttf
          test -f fonts/wenkai/LXGWWenKai-Regular.ttf
          test -f fonts/wenkai/LXGWWenKai-Medium.ttf
          test -f fonts/wenkai/LXGWWenKaiMono-Light.ttf
          test -f fonts/wenkai/LXGWWenKaiMono-Regular.ttf
          test -f fonts/wenkai/LXGWWenKaiMono-Medium.ttf

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch JetBrains Sans from CDN (non-mono donor, woff2 → TTF)
        run: |
          mkdir -p fonts/jetbrains_sans
          python scripts/fetch_jbsans.py --output-dir fonts/jetbrains_sans
          echo "JetBrains Sans TTFs:"
          ls -lh fonts/jetbrains_sans/
          test -f fonts/jetbrains_sans/JetBrainsSans-Light.ttf
          test -f fonts/jetbrains_sans/JetBrainsSans-Regular.ttf
          test -f fonts/jetbrains_sans/JetBrainsSans-Bold.ttf

      - name: Download Nerd Fonts archives (NerdFontsSymbolsOnly + JetBrainsMono)
        env:
          NERD_TAG: ${{ needs.resolve-params.outputs.nerd_tag }}
        run: |
          mkdir -p fonts/nerd_symbols fonts/jetbrainsmono

          SYMBOLS_ARCHIVE="NerdFontsSymbolsOnly.tar.xz"
          SYMBOLS_URL="https://github.com/ryanoasis/nerd-fonts/releases/download/${NERD_TAG}/${SYMBOLS_ARCHIVE}"
          echo "Downloading ${SYMBOLS_ARCHIVE} ..."
          curl -fsSL "$SYMBOLS_URL" -o "/tmp/${SYMBOLS_ARCHIVE}"
          echo "Extracting NerdFontsSymbolsOnly ..."
          tar -xJf "/tmp/${SYMBOLS_ARCHIVE}" -C fonts/nerd_symbols/
          echo "Nerd Fonts Symbols Only files:"
          ls fonts/nerd_symbols/
          # Locate the Regular TTF (filename may vary across nerd-fonts releases)
          SYMBOLS_TTF=$(ls fonts/nerd_symbols/NerdFontsSymbolsOnly-Regular.ttf 2>/dev/null \
                     || ls fonts/nerd_symbols/NerdFontsSymbolsNerdFont-Regular.ttf 2>/dev/null \
                     || ls fonts/nerd_symbols/*.ttf | grep -i regular | head -1 \
                     || ls fonts/nerd_symbols/*.ttf | head -1)
          echo "Using symbols TTF: $SYMBOLS_TTF"
          test -n "$SYMBOLS_TTF"

          JBM_ARCHIVE="JetBrainsMono.tar.xz"
          JBM_URL="https://github.com/ryanoasis/nerd-fonts/releases/download/${NERD_TAG}/${JBM_ARCHIVE}"
          echo "Downloading ${JBM_ARCHIVE} ..."
          curl -fsSL "$JBM_URL" -o "/tmp/${JBM_ARCHIVE}"
          echo "Extracting JetBrains Mono fonts ..."
          tar -xJf "/tmp/${JBM_ARCHIVE}" -C fonts/jetbrainsmono/
          echo "JetBrainsMonoNerdFontMono fonts found:"
          ls fonts/jetbrainsmono/JetBrainsMonoNerdFontMono*.ttf
          test -f fonts/jetbrainsmono/JetBrainsMonoNerdFontMono-Light.ttf
          test -f fonts/jetbrainsmono/JetBrainsMonoNerdFontMono-Regular.ttf
          test -f fonts/jetbrainsmono/JetBrainsMonoNerdFontMono-Bold.ttf

      - name: Patch JetBrains Sans with Nerd Fonts symbols (non-mono pre-patch)
        run: |
          mkdir -p fonts/jetbrains_sans_patched

          SYMBOLS_TTF=$(ls fonts/nerd_symbols/NerdFontsSymbolsOnly-Regular.ttf 2>/dev/null \
                     || ls fonts/nerd_symbols/NerdFontsSymbolsNerdFont-Regular.ttf 2>/dev/null \
                     || ls fonts/nerd_symbols/*.ttf | grep -i regular | head -1 \
                     || ls fonts/nerd_symbols/*.ttf | head -1)
          echo "Nerd symbols source: $SYMBOLS_TTF"

          for STYLE in Light Regular Bold; do
            INPUT="fonts/jetbrains_sans/JetBrainsSans-${STYLE}.ttf"
            OUTPUT="fonts/jetbrains_sans_patched/JetBrainsSans-NerdPatched-${STYLE}.ttf"
            echo "Patching ${STYLE} ..."
            python scripts/patch.py --input "$INPUT" --symbols "$SYMBOLS_TTF" --output "$OUTPUT"
          done

          echo "Patched fonts:"
          ls -lh fonts/jetbrains_sans_patched/
          test -f fonts/jetbrains_sans_patched/JetBrainsSans-NerdPatched-Light.ttf
          test -f fonts/jetbrains_sans_patched/JetBrainsSans-NerdPatched-Regular.ttf
          test -f fonts/jetbrains_sans_patched/JetBrainsSans-NerdPatched-Bold.ttf

      - name: Upload font sources as artifact
        uses: actions/upload-artifact@v6
        with:
          name: font-sources
          path: |
            fonts/wenkai/
            fonts/jetbrains_sans_patched/
            fonts/jetbrainsmono/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 3: Build merged fonts (6-way matrix, runs in parallel)
  # ---------------------------------------------------------------------------
  build:
    needs: [resolve-params, download-fonts]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false # Build all styles even if one fails
      matrix:
        include:
          - style: Light
            wenkai_file: LXGWWenKai-Light.ttf
            donor_subdir: jetbrains_sans_patched
            donor_file: JetBrainsSans-NerdPatched-Light.ttf
            output_file: ENSFont-Light.ttf
            is_mono: false
            family_name: ENS Font
            ps_family: ENSFont

          - style: Light
            wenkai_file: LXGWWenKaiMono-Light.ttf
            donor_subdir: jetbrainsmono
            donor_file: JetBrainsMonoNerdFontMono-Light.ttf
            output_file: ENSFontMono-Light.ttf
            is_mono: true
            family_name: ENS Font Mono
            ps_family: ENSFontMono

          - style: Regular
            wenkai_file: LXGWWenKai-Regular.ttf
            donor_subdir: jetbrains_sans_patched
            donor_file: JetBrainsSans-NerdPatched-Regular.ttf
            output_file: ENSFont-Regular.ttf
            is_mono: false
            family_name: ENS Font
            ps_family: ENSFont

          - style: Regular
            wenkai_file: LXGWWenKaiMono-Regular.ttf
            donor_subdir: jetbrainsmono
            donor_file: JetBrainsMonoNerdFontMono-Regular.ttf
            output_file: ENSFontMono-Regular.ttf
            is_mono: true
            family_name: ENS Font Mono
            ps_family: ENSFontMono

          - style: Bold
            # WenKai has no Bold; Medium is the closest weight
            wenkai_file: LXGWWenKai-Medium.ttf
            donor_subdir: jetbrains_sans_patched
            donor_file: JetBrainsSans-NerdPatched-Bold.ttf
            output_file: ENSFont-Bold.ttf
            is_mono: false
            family_name: ENS Font
            ps_family: ENSFont

          - style: Bold
            # WenKai has no Bold; Medium is the closest weight
            wenkai_file: LXGWWenKaiMono-Medium.ttf
            donor_subdir: jetbrainsmono
            donor_file: JetBrainsMonoNerdFontMono-Bold.ttf
            output_file: ENSFontMono-Bold.ttf
            is_mono: true
            family_name: ENS Font Mono
            ps_family: ENSFontMono

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download font sources
        uses: actions/download-artifact@v7
        with:
          name: font-sources
          path: fonts/

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Build ${{ matrix.style }}
        env:
          VERSION: ${{ needs.resolve-params.outputs.version }}
          LXGW_TAG: ${{ needs.resolve-params.outputs.lxgw_tag }}
          NERD_TAG: ${{ needs.resolve-params.outputs.nerd_tag }}
        run: |
          mkdir -p dist

          LXGW_VER="${LXGW_TAG#v}"
          NERD_VER="${NERD_TAG#v}"

          python scripts/merge.py \
            --wenkai  "fonts/wenkai/${{ matrix.wenkai_file }}" \
            --donor   "fonts/${{ matrix.donor_subdir }}/${{ matrix.donor_file }}" \
            --output  "dist/${{ matrix.output_file }}" \
            --family-name "${{ matrix.family_name }}" \
            --ps-family "${{ matrix.ps_family }}" \
            --style   "${{ matrix.style }}" \
            --version "$VERSION" \
            --lxgw-version "$LXGW_VER" \
            --nerd-version "$NERD_VER" \
            $(if [ "${{ matrix.is_mono }}" = "true" ]; then echo "--mono"; fi)

      - name: Verify OFL compliance
        run: |
          python3 - <<'EOF'
          from fontTools.ttLib import TTFont
          import sys

          path = "dist/${{ matrix.output_file }}"
          font = TTFont(path)
          name = font["name"]

          family  = name.getDebugName(1) or ""
          ps_name = name.getDebugName(6) or ""
          version = name.getDebugName(5) or ""

          print(f"Family name    : {family}")
          print(f"PostScript name: {ps_name}")
          print(f"Version string : {version}")

          # OFL reserved name checks
          violations = []
          for reserved in ["LXGW", "霞鶩", "Klee"]:
              if reserved in family or reserved in ps_name:
                  violations.append(f"Reserved name '{reserved}' found in font metadata!")

          if violations:
              for v in violations:
                  print(f"OFL VIOLATION: {v}", file=sys.stderr)
              sys.exit(1)

          print("OFL compliance checks PASSED")
          EOF

      - name: Upload built font
        uses: actions/upload-artifact@v6
        with:
          name: font-${{ matrix.output_file }}
          path: dist/${{ matrix.output_file }}
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 4: Bundle TTC (TrueType Collection)
  # ---------------------------------------------------------------------------
  bundle-ttc:
    needs: [resolve-params, build]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download all built fonts
        uses: actions/download-artifact@v7
        with:
          pattern: font-*
          path: dist/
          merge-multiple: true

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Bundle TTFs into TTC
        run: |
          python scripts/bundle_ttc.py --input-dir dist/ --output dist/ENSFont.ttc
          ls -lh dist/ENSFont.ttc

      - name: Upload TTC artifact
        uses: actions/upload-artifact@v6
        with:
          name: font-ENSFont.ttc
          path: dist/ENSFont.ttc
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Job 5: Assemble and publish GitHub Release
  # ---------------------------------------------------------------------------
  release:
    needs: [resolve-params, build, bundle-ttc]
    runs-on: ubuntu-latest
    if: success()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Download all built fonts (TTFs + TTC)
        uses: actions/download-artifact@v7
        with:
          pattern: font-*
          path: dist/
          merge-multiple: true

      - name: Create ZIP archive
        env:
          VERSION: ${{ needs.resolve-params.outputs.version }}
        run: |
          ls -lh dist/
          cd dist
          zip -j "../ENSFont-${VERSION}.zip" *.ttf *.ttc
          cd ..
          zip "ENSFont-${VERSION}.zip" README.md LICENSE.md
          ls -lh "ENSFont-${VERSION}.zip"

      - name: Set up Python for release notes
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ secrets.BOT_PAT }}
        run: |
          python scripts/build_release_notes.py \
            --version      "${{ needs.resolve-params.outputs.version }}" \
            --lxgw-tag     "${{ needs.resolve-params.outputs.lxgw_tag }}" \
            --nerd-tag     "${{ needs.resolve-params.outputs.nerd_tag }}" \
            --jbm-tag      "${{ needs.resolve-params.outputs.jbm_tag }}" \
            --lxgw-changed "${{ needs.resolve-params.outputs.lxgw_changed }}" \
            --nerd-changed "${{ needs.resolve-params.outputs.nerd_changed }}" \
            --jbm-changed  "${{ needs.resolve-params.outputs.jbm_changed }}" \
            --output       /tmp/release_notes.md
          echo "--- Release notes preview (first 30 lines) ---"
          head -30 /tmp/release_notes.md

      - name: Create git tag
        env:
          GIT_TAG: ${{ needs.resolve-params.outputs.git_tag }}
        run: |
          git config user.name  "ENS Font Bot"
          git config user.email "bot@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$GIT_TAG" "refs/tags/$GIT_TAG^{}" >/dev/null 2>&1; then
            echo "Tag $GIT_TAG already exists on origin, skipping tag push."
          else
            if ! git rev-parse "$GIT_TAG" >/dev/null 2>&1; then
              git tag -a "$GIT_TAG" -m "Release $GIT_TAG"
            fi
            git push origin "$GIT_TAG"
            echo "Created and pushed tag: $GIT_TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.BOT_PAT }}
          tag_name: ${{ needs.resolve-params.outputs.git_tag }}
          name: "ENS Font v${{ needs.resolve-params.outputs.version }}"
          body_path: /tmp/release_notes.md
          draft: false
          prerelease: false
          files: |
            dist/ENSFont-Light.ttf
            dist/ENSFontMono-Light.ttf
            dist/ENSFont-Regular.ttf
            dist/ENSFontMono-Regular.ttf
            dist/ENSFont-Bold.ttf
            dist/ENSFontMono-Bold.ttf
            dist/ENSFont.ttc
            ENSFont-${{ needs.resolve-params.outputs.version }}.zip
